# Nginx site config for Quotation Studio on a Vultr VPS.
# Serves the built React frontend as static files, and reverse-proxies
# /api/* to the Node/Express/Puppeteer backend running on localhost:4000.
#
# Install: copy this file to /etc/nginx/sites-available/quotation-studio,
# then symlink it into sites-enabled (see deploy/DEPLOY.md for full steps).

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;  # e.g. quotation.mkjtravel.com or the server's raw IP

    # Serve the built frontend
    root /var/www/quotation-studio/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # SPA routing fallback
    }

    # Reverse-proxy API calls to the Express/Puppeteer backend
    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # PDF generation can take a while on first request — give it room
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:4000/health;
    }
}
