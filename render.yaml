services:
  # Backend — persistent Express + Puppeteer server generating the MKJ PDF
  - type: web
    name: mkj-pdf-server
    runtime: node
    rootDir: server
    buildCommand: "./render-build.sh"
    startCommand: "node index.js"
    plan: free
    envVars:
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
      - key: ALLOWED_ORIGIN
        value: "*"
        # ⚠️ Change this to your actual frontend URL after first deploy
        # (e.g. https://quotation-studio.onrender.com) for tighter CORS.

  # Frontend — static Vite build (the calculator itself)
  - type: web
    name: quotation-studio
    runtime: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # ⚠️ Update this to the actual URL Render assigns the mkj-pdf-server
        # service above after your first deploy (Render shows it in the dashboard),
        # then trigger a redeploy of this frontend service for the change to apply.
        value: "https://mkj-pdf-server.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
